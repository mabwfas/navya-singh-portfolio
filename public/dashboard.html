<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Factory — Dashboard</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#050505;--card:#0a0a0a;--border:rgba(255,255,255,0.06);--text:#e4e4e7;--muted:#71717a;--brand:#6366f1;--green:#10b981;--amber:#f59e0b;--pink:#ec4899;--purple:#8b5cf6}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .container{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}

  /* Header */
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem;flex-wrap:wrap;gap:1rem}
  .header h1{font-size:1.5rem;font-weight:700;letter-spacing:-0.02em}
  .header h1 span{background:linear-gradient(135deg,var(--brand),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .badge{display:inline-flex;align-items:center;gap:0.5rem;padding:0.4rem 1rem;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,0.02);font-size:0.7rem;color:var(--muted);font-family:monospace;letter-spacing:0.1em;text-transform:uppercase}
  .badge .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}

  /* Stats Row */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;text-align:center}
  .stat-card .value{font-size:1.75rem;font-weight:700;margin-bottom:0.25rem}
  .stat-card .label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em;font-family:monospace}

  /* Section */
  .section-title{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.2em;font-family:monospace;margin-bottom:1rem;display:flex;align-items:center;gap:0.75rem}
  .section-title::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--brand);opacity:0.6}

  /* Deployment Cards */
  .deployments{display:grid;gap:1rem;margin-bottom:2.5rem}
  .deploy-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center;transition:border-color 0.3s}
  .deploy-card:hover{border-color:rgba(99,102,241,0.3)}
  .deploy-info h3{font-size:1rem;font-weight:600;margin-bottom:0.25rem}
  .deploy-info .meta{display:flex;flex-wrap:wrap;gap:0.75rem;font-size:0.75rem;color:var(--muted)}
  .deploy-info .meta span{display:flex;align-items:center;gap:0.3rem}
  .deploy-actions{display:flex;gap:0.5rem;flex-wrap:wrap}
  .btn{padding:0.5rem 1rem;border-radius:8px;font-size:0.75rem;font-weight:500;text-decoration:none;transition:all 0.2s;cursor:pointer;border:none;font-family:inherit}
  .btn-primary{background:var(--brand);color:white}
  .btn-primary:hover{background:#818cf8}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
  .btn-outline:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.03)}
  .status-dot{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.7rem;font-family:monospace}
  .status-dot::before{content:'';width:6px;height:6px;border-radius:50%}
  .status-dot.live::before{background:var(--green)}
  .status-dot.draft::before{background:var(--amber)}
  .status-dot.building::before{background:var(--purple);animation:pulse 1s infinite}

  /* Niche Templates */
  .templates{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;margin-bottom:2.5rem}
  .template-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;cursor:pointer;transition:all 0.2s}
  .template-card:hover{border-color:rgba(99,102,241,0.3);transform:translateY(-2px)}
  .template-card .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;margin-bottom:0.75rem}
  .template-card h4{font-size:0.85rem;font-weight:600;margin-bottom:0.25rem}
  .template-card p{font-size:0.7rem;color:var(--muted);line-height:1.5}

  /* Quick Actions */
  .quick-actions{display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:2.5rem}
  .quick-action{display:flex;align-items:center;gap:0.5rem;padding:0.6rem 1.2rem;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid var(--border);font-size:0.75rem;color:var(--muted);cursor:pointer;transition:all 0.2s;font-family:monospace}
  .quick-action:hover{border-color:rgba(99,102,241,0.3);color:var(--text)}
  .quick-action code{color:var(--brand);font-size:0.7rem}

  /* Footer */
  .footer{text-align:center;padding:2rem 0;border-top:1px solid var(--border);margin-top:2rem}
  .footer p{font-size:0.7rem;color:var(--muted);font-family:monospace}

  @media(max-width:768px){
    .deploy-card{grid-template-columns:1fr}
    .deploy-actions{justify-content:flex-start}
  }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>Portfolio <span>Factory</span></h1>
    <div class="badge">
      <span class="dot"></span>
      Dashboard v1.0
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats">
    <div class="stat-card">
      <div class="value" id="total-sites">—</div>
      <div class="label">Total Sites</div>
    </div>
    <div class="stat-card">
      <div class="value" id="live-sites">—</div>
      <div class="label">Live</div>
    </div>
    <div class="stat-card">
      <div class="value" id="total-niches">—</div>
      <div class="label">Niches Available</div>
    </div>
    <div class="stat-card">
      <div class="value" id="total-profiles">—</div>
      <div class="label">Profiles</div>
    </div>
  </div>

  <!-- Active Deployments -->
  <div class="section-title">Active Deployments</div>
  <div class="deployments" id="deployments">
    <!-- Populated by JS -->
  </div>

  <!-- Available Niche Templates -->
  <div class="section-title">Niche Templates</div>
  <div class="templates" id="templates">
    <!-- Populated by JS -->
  </div>

  <!-- Quick Actions / CLI Commands -->
  <div class="section-title">Quick Commands</div>
  <div class="quick-actions">
    <div class="quick-action" onclick="copyCmd('node scripts/build-niche.js shreyansh-singh shopify')">
      Build Shopify <code>build-niche.js</code>
    </div>
    <div class="quick-action" onclick="copyCmd('node scripts/deploy-niche.js shopify')">
      Deploy Shopify <code>deploy-niche.js</code>
    </div>
    <div class="quick-action" onclick="copyCmd('node scripts/build-niche.js --all shreyansh-singh')">
      Build All <code>--all</code>
    </div>
    <div class="quick-action" onclick="copyCmd('node scripts/deploy-niche.js --all')">
      Deploy All <code>--all</code>
    </div>
    <div class="quick-action" onclick="copyCmd('node scripts/deploy-niche.js --status')">
      Status <code>--status</code>
    </div>
  </div>

  <div class="footer">
    <p>Portfolio Factory — Built with /folio skill</p>
  </div>
</div>

<script>
// ─── Data ───────────────────────────────────────────────────
const niches = [
  { id: 'dev', label: 'Full-Stack Dev', icon: '💻', color: '#6366f1', desc: 'Mobile app + Shopify dual identity portfolio' },
  { id: 'shopify', label: 'Shopify Expert', icon: '🛒', color: '#10b981', desc: 'E-commerce & Shopify specialist portfolio' },
  { id: 'flutter', label: 'Flutter Dev', icon: '📱', color: '#3b82f6', desc: 'Flutter & cross-platform specialist portfolio' },
  { id: 'fintech', label: 'Fintech Dev', icon: '💰', color: '#f59e0b', desc: 'Payment & banking app specialist portfolio' },
  { id: 'freelance', label: 'Freelancer', icon: '🚀', color: '#8b5cf6', desc: 'Client-facing portfolio with pricing focus' },
  { id: 'resume', label: 'Clean Resume', icon: '📄', color: '#ec4899', desc: 'Minimal single-page resume layout' },
];

const deployments = [
  {
    id: 'shreyansh-singh-dev',
    niche: 'dev',
    label: 'Mobile App & Shopify Developer',
    url: 'https://shreyansh-singh-dev.vercel.app',
    status: 'live',
    lastDeployed: '2026-03-12',
  },
];

// ─── Render ─────────────────────────────────────────────────
function render() {
  // Stats
  document.getElementById('total-sites').textContent = deployments.length;
  document.getElementById('live-sites').textContent = deployments.filter(d => d.status === 'live').length;
  document.getElementById('total-niches').textContent = niches.length;
  document.getElementById('total-profiles').textContent = '1';

  // Deployments
  const deploymentsEl = document.getElementById('deployments');
  deploymentsEl.innerHTML = deployments.map(d => `
    <div class="deploy-card">
      <div class="deploy-info">
        <h3>${d.label}</h3>
        <div class="meta">
          <span class="status-dot ${d.status}">${d.status}</span>
          <span>${d.id}</span>
          <span>Last: ${d.lastDeployed}</span>
        </div>
      </div>
      <div class="deploy-actions">
        <a href="${d.url}" target="_blank" class="btn btn-primary">Visit Site</a>
        <button class="btn btn-outline" onclick="copyCmd('node scripts/build-niche.js shreyansh-singh ${d.niche}')">Rebuild</button>
      </div>
    </div>
  `).join('');

  // Templates
  const templatesEl = document.getElementById('templates');
  templatesEl.innerHTML = niches.map(n => {
    const isDeployed = deployments.some(d => d.niche === n.id);
    return `
    <div class="template-card" onclick="copyCmd('node scripts/build-niche.js shreyansh-singh ${n.id}')">
      <div class="icon" style="background:${n.color}15;border:1px solid ${n.color}30">${n.icon}</div>
      <h4>${n.label} ${isDeployed ? '<span style="color:var(--green);font-size:0.6rem">● LIVE</span>' : ''}</h4>
      <p>${n.desc}</p>
    </div>
  `}).join('');
}

function copyCmd(cmd) {
  navigator.clipboard.writeText(cmd).then(() => {
    const el = event.target.closest('.quick-action, .template-card, .btn');
    if (el) {
      const orig = el.style.borderColor;
      el.style.borderColor = 'var(--green)';
      setTimeout(() => el.style.borderColor = orig, 800);
    }
  });
}

render();
</script>
</body>
</html>
